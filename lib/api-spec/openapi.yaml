openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.3.0
  description: API specification for Nafida Biz
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: User profile operations
  - name: companies
    description: Company management
  - name: declarations
    description: Tax declaration management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      responses:
        "200":
          description: Profile fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List all companies for current user
      responses:
        "200":
          description: Companies list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
        "401":
          description: Unauthorized
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a new company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyBody"
      responses:
        "201":
          description: Company created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "401":
          description: Unauthorized

  /declarations:
    get:
      operationId: listDeclarations
      tags: [declarations]
      summary: List declarations for a company
      parameters:
        - in: query
          name: company_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Declarations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Declaration"
        "401":
          description: Unauthorized
    post:
      operationId: createDeclaration
      tags: [declarations]
      summary: Create a new tax declaration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeclarationBody"
      responses:
        "201":
          description: Declaration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Declaration"
        "401":
          description: Unauthorized

  /declarations/{id}:
    patch:
      operationId: updateDeclarationStatus
      tags: [declarations]
      summary: Update declaration status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeclarationStatusBody"
      responses:
        "200":
          description: Declaration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Declaration"
        "401":
          description: Unauthorized
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        full_name:
          type: string
        company_name:
          type: string
        nif:
          type: string
        nis:
          type: string
        rc:
          type: string
        ai:
          type: string
        created_at:
          type: string
      required:
        - id
        - email

    UpdateProfileBody:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        full_name:
          type: string
        company_name:
          type: string
        nif:
          type: string
        nis:
          type: string
        rc:
          type: string
        ai:
          type: string

    Company:
      type: object
      properties:
        id:
          type: string
        owner_id:
          type: string
        company_name:
          type: string
        nif_number:
          type: string
        rc_number:
          type: string
        tax_regime:
          type: string
        has_startup_label:
          type: boolean
        created_at:
          type: string
      required:
        - id
        - owner_id
        - company_name

    CreateCompanyBody:
      type: object
      properties:
        company_name:
          type: string
        nif_number:
          type: string
        rc_number:
          type: string
        tax_regime:
          type: string
        has_startup_label:
          type: boolean
      required:
        - company_name

    Declaration:
      type: object
      properties:
        id:
          type: string
        owner_id:
          type: string
        company_id:
          type: string
        period:
          type: string
        tax_type:
          type: string
        revenue:
          type: string
        tax_rate:
          type: string
        tax_amount:
          type: string
        tap_amount:
          type: string
        tva_amount:
          type: string
        irg_amount:
          type: string
        purchases:
          type: string
        salaries:
          type: string
        status:
          type: string
        notes:
          type: string
        created_at:
          type: string
      required:
        - id
        - owner_id
        - company_id
        - period
        - tax_type
        - status

    CreateDeclarationBody:
      type: object
      properties:
        company_id:
          type: string
        period:
          type: string
        tax_type:
          type: string
        revenue:
          type: string
        tax_rate:
          type: string
        tax_amount:
          type: string
        tap_amount:
          type: string
        tva_amount:
          type: string
        irg_amount:
          type: string
        purchases:
          type: string
        salaries:
          type: string
        status:
          type: string
        notes:
          type: string
      required:
        - company_id
        - period
        - tax_type
        - status

    UpdateDeclarationStatusBody:
      type: object
      properties:
        status:
          type: string
      required:
        - status
